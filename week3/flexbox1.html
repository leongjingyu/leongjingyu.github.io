<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            background-color: rgb(233, 231, 221);
        }

        img {
            border-radius: 5px;
        }

        h3 {
            margin: 10px;
            font-family: Arial, Helvetica, sans-serif;
        }

        p {
            margin: 10px 10px;
            font-size: 14px;
            font-family: 'Barlow Semi Condensed', sans-serif;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .project {
            background: rgb(255, 255, 255);
            padding: 10px;
            border-radius: 5px;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="project">
            <img src="image/residential.jpg" width="100%">
            <h3>Residential projects</h3>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="project">
            <img src="image/commercial.jpg" width="100%">
            <h3>Commercial spaces</h3>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="project">
            <img src="image/infrastructure.jpg" width="100%">
            <h3>Infrastructure works</h3>
            <p>We develop strong, reliable infrastructure growing communities.</p>

        </div>
    </div>


</body>

</html>
