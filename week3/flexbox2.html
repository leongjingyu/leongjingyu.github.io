<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            margin-right: 10px;
        }

        .menu {
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }

        .button button {
            color: rgb(255, 255, 255);
            border: 1px solid rgb(0, 0, 0);
            border-radius: 8px;
            padding: 10px 20px;
        }

        .text {
            padding: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paragraph {
            width: 45%;
        }

        .image {
            width: 45%;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="bar">
        <img src="image/icon.png" width="20" height="20">

    </div>

    <div class="menu">
        <p>About Us</p>
        <p>Services</p>
        <p>Use Cases</p>
        <p>Pricing </p>
        <p>Blog</p>
    </div>

    <div class="button">
        <button>Request a quote</button>
    </div>

    <div class="text">
        <div class="paragraph">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</p>
            <button>Book a consutation</button>
        </div>

        <div class="image">
            <img src="image/illustration.png" width="400px">
        </div>
    </div>
    </div>

</body>

</html>
