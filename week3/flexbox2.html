<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Gelasio:ital,wght@0,400..700;1,400..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap');

        body {
            margin: 40px 150px;
            font-family: "Space Grotesk", sans-serif;
        }

        .bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 30px;
            gap: 20px
        }

        .menu {
            display: flex;
            gap: 60px;
            align-items: center;
            font-size: 15px;
            margin-left: 200px
        }

        .request {
            padding: 20px 30px;
            background: white;
            border: 1px solid black;
            border-radius: 14px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 15px;
        }

        .text {
            display: flex;
            justify-content: space-between;
            gap: 35px;
            padding: 35px 0px;
        }

        .left {
            width: 45%;

        }

        .leftimage {
            width: 40%;
        }

        h1 {
            font-size: 60px;
            font-weight: 500;

        }

        p {
            font-size: 20px;
            line-height: 1.4;
        }

        .book {
            background-color: black;
            color: white;
            border: none;
            border-radius: 16px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 20px;
            padding: 20px 35px;
            margin-top: 20px;
        }

        .logo {
            display: flex;
            justify-content: space-between;
            margin: 80px 0;
        }

        .filter {
            filter: grayscale(100%);
        }
    </style>

</head>

<body>
    <div class="bar">
        <img src="image/logo.png" alt="logo" width="200px" height="36px">
        <div class="menu">
            <div>About Us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
        </div>
        <button class="request">Request a quote</button>
    </div>
    <div class="text">
        <div class="left">
            <div>
                <h1>Navigating the digital landscape for success</h1>
            </div>
            <div>
                <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including SEO, PPC, social media marketing, and content creation.</p>
            </div>
            <button class="book">Book a consutation</button>
        </div>
        <div>
            <img src="image/illustration.png" width="580px">
        </div>
    </div>
    <div class="'company">
        <div class="logo">
            <img src="image/amazon.png" class="filter" alt="amazon">
            <img src="image/dribbble.png" class="filter" alt="dribbble">
            <img src="image/hubspot.png" class="filter" alt="hubspot">
            <img src="image/notion.png" class="filter" alt="notion">
            <img src="image/netflix.png" class="filter" alt="netflix">
            <img src="image/zoom.png" class="filter" alt="zoom">
        </div>
    </div>
</body>

</html>
