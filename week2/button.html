<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button.Request {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            font-size: 16px;
            padding: 10px 20px;
            margin: 5px;
        }

        button.Signup {
            background-color: rgb(85, 163, 90);
            color: rgb(255, 255, 255);
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            padding: 10px 25px;
            margin: 5px;
        }

        button.AddtoCart {
            background-color: rgb(249, 218, 78);
            color: rgb(0, 0, 0);
            font-size: 16px;
            border-radius: 20px;
            border: none;
            padding: 10px 60px;
            margin: 5px;
        }

        button.GetStarted {
            background-color: rgb(115, 83, 173);
            color: rgb(255, 255, 255);
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            padding: 10px 20px;
            margin: 5px;
        }

        button.Download {
            background-color: rgb(255, 255, 255);
            color: rgb(136, 141, 146);
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            border: 2px solid rgb(136, 141, 146);
            padding: 10px 20px;
            margin: 5px;
        }

        button.Apply {
            background-color: rgb(45, 101, 188);
            color: rgb(255, 255, 255);
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            border: none;
            padding: 10px 30px;
            margin: 5px;
        }

        button.Save {
            background-color: rgb(255, 255, 255);
            color: rgb(45, 101, 188);
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            border: 2px solid rgb(45, 101, 188);
            padding: 10px 20px;
            margin: 5px;
        }
    </style>
</head>

<body>
    <button class="Request">Request now</button>
    <button class="Signup">Sign up</button>
    <button class="AddtoCart">Add to Cart</button><br>
    <button class="GetStarted">Get Started</button>
    <button class="Download">Download</button>
    <button class="Apply">Apply on company website</button>
    <button class="Save">Save</button>

</body>

</html>
