<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(141, 212, 234);
        }

        h1 {
            color: rgb(143, 90, 201);
            font-family: "Arial", sans-serif;
            text-align: center;
            text-decoration: underline;
            font-size: 50px;
        }

        h1.nounderline {
            text-decoration: none;
            text-align: right;
            font-size: 36px;
        }

        p {
            color: rgb(154, 11, 128);
            background-color: rgb(215, 210, 212);
            border: 2px solid rgb(0, 0, 0);
            border-radius: 20px;
            padding: 10px;
            margin: 80px;
            font-family: "Arial", sans-serif;
            text-align: center;
        }


        img {
            margin: auto;
            /* Center the image horizontally */
            display: block;
            /* Make the image to non sharing spacing*/
        }
    </style>
</head>

<body>
    <h1>Illit</h1>
    <h1 class="nounderline">illit</h1>
    <img src="image/illit.webp" width="250" alt="illit">
    <p>Illit is a South Korean girl group.</p>

</body>

</html>
